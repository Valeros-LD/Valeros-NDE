<div [class.hidden]="shouldHideWidget()">
  <ng-template #widgetContent>
    @if (widget().options?.showOriginalLink) {
      <div class="mb-2">
        <app-link-widget
          [node]="this.data()"
          [property]="property()"
          [config]="{ showPropertyLabel: false }"
        />
      </div>
    }
    <ng-container #widgetContainer></ng-container>
  </ng-template>

  @if (widget().options?.showPropertyLabel !== false) {
    <app-property-label-wrapper
      [property]="property()"
      [options]="widget().options || {}"
    >
      <ng-container *ngTemplateOutlet="widgetContent" />
    </app-property-label-wrapper>
  } @else {
    <ng-container *ngTemplateOutlet="widgetContent" />
  }
</div>
