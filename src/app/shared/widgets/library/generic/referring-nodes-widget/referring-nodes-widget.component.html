@if (loading()) {
  <div class="flex items-center justify-center p-4">
    <span class="loading loading-spinner loading-md"></span>
  </div>
} @else if (error()) {
  <div class="alert alert-error">
    <span>{{ error() }}</span>
  </div>
} @else {
  @if (hasResults()) {
    <div class="space-y-2 space-x-2">
      <div class="text-sm text-gray-600">
        {{ totalReferringNodes() }} objecten verwijzen naar dit object
      </div>

      @for (item of referringNodes(); track item.id) {
        <div class="badge badge-primary py-4 px-4">
          <app-node-link [node]="item" [showType]="false" />
        </div>
      }
    </div>
  } @else {
    <p class="text-gray-500">
      Er zijn geen objecten die naar dit object verwijzen
    </p>
  }
}
