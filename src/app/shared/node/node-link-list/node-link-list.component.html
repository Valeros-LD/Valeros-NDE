<div class="flex flex-wrap gap-2">
  @for (node of nodes(); track node.id) {
    @if (imageResolver.hasImage(node)) {
      <app-node-link [node]="node" [showType]="showType()" mode="image-card" />
    } @else {
      <span class="badge badge-primary py-4 px-4">
        <app-node-link [node]="node" [showType]="showType()" />
      </span>
    }
  }
</div>
